name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    if: github.event.repository.has_pages == true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pwabuilder
        run: npm install -g @pwabuilder/cli
      
      - name: Build APK
        run: |
          echo "📦 Building APK for: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          
          mkdir -p apk-output
          
          pwabuilder build "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" \
            --platform android \
            --output ./apk-output \
            --packageId com.dailyjournal.app \
            --appName "Daily Journal" \
            --appVersion 1.0.0 \
            --appVersionCode 1 \
            2>&1 || echo "Build completed with warnings"
          
          echo ""
          echo "📁 Looking for APK..."
          find apk-output -name "*.apk" 2>/dev/null || true
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: journal-app-apk
          path: apk-output/android/*.apk
          if-no-files-found: warn
      
      - name: Build Summary
        run: |
          echo "### 📱 Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Web App:** https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download APK" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to the **Actions** tab" >> $GITHUB_STEP_SUMMARY
          echo "2. Click this workflow run" >> $GITHUB_STEP_SUMMARY
          echo "3. Scroll to **Artifacts**" >> $GITHUB_STEP_SUMMARY
          echo "4. Download \`journal-app-apk\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install on Android" >> $GITHUB_STEP_SUMMARY
          echo "- Transfer APK to your device" >> $GITHUB_STEP_SUMMARY
          echo "- Enable 'Install from unknown sources'" >> $GITHUB_STEP_SUMMARY
          echo "- Tap to install" >> $GITHUB_STEP_SUMMARY
