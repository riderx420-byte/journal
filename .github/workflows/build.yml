name: Build and Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  enable-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Enable GitHub Pages
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/pages \
            -d '{"source":{"branch":"main","path":"/"}}' \
            || echo "Pages may already be enabled"

  deploy-pages:
    needs: enable-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
        continue-on-error: true
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli
      
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias journal-key \
            -storepass android -keypass android \
            -dname "CN=Journal App, OU=Development, O=Daily Journal, L=Unknown, ST=Unknown, C=US"
      
      - name: Try Bubblewrap Build
        id: bubblewrap
        continue-on-error: true
        run: |
          mkdir -p twa
          cat > twa/bubblewrap-config.json << 'EOF'
          {
            "appVersionName": "1.0.0",
            "appVersionCode": 1,
            "applicationId": "com.dailyjournal.app",
            "appName": "Daily Journal",
            "launcherName": "Daily Journal",
            "display": "standalone",
            "fallbackType": "customtabs",
            "enableNotifications": true,
            "startUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/",
            "iconUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/icons/icon-512.svg",
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/manifest.json",
            "features": {},
            "alphaDependencies": {
              "enabled": false
            },
            "appBuild": 1,
            "retainedBundles": [],
            "signing": {
              "keyStoreUrl": "file:///home/runner/work/journal/journal/keystore.jks",
              "keyStorePassword": "android",
              "keyPassword": "android"
            },
            "additionalTrustedOrigins": [],
            "host": "${{ github.repository_owner }}.github.io",
            "fullScopeUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/",
            "themeColor": "#1a1a2e",
            "backgroundColor": "#0f0f1a",
            "navigationColor": "#1a1a2e",
            "navigationColorDark": "#0f0f1a",
            "navigationDividerColor": "#1a1a2e",
            "navigationDividerColorDark": "#0f0f1a"
          }
          EOF
          cp twa/bubblewrap-config.json twa/twa-manifest.json
          cd twa
          echo -e "n\n$JAVA_HOME\n" | timeout 120 bubblewrap build --skipValidation 2>&1
      
      - name: Fallback - Build WebView APK
        if: steps.bubblewrap.outcome == 'failure'
        run: |
          echo "Bubblewrap failed, building WebView APK..."
          bash build-webview-apk.sh
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: journal-app-apk
          path: |
            twa/app-release-signed.apk
            daily-journal.apk
            android-app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
